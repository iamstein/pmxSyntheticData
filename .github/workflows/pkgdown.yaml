on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # pak does not read Additional_repositories from DESCRIPTION, so the
          # OpenDP r-universe has to be declared here or the suggested `opendp`
          # dependency cannot be resolved and the whole solve fails.
          extra-repositories: https://opendp.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      # The public RSPM binary of stringfish is linked against the TBB ABI that
      # RcppParallel shipped before 6.0.0, so loading it against RcppParallel
      # 6.0.0 fails with "undefined symbol: ...concurrent_vector_base_v3...".
      # stringfish arrives transitively (rxode2 -> qs -> stringfish) and is
      # loaded during the site build, when downlit resolves the rxode2
      # references in vignettes/articles/model-elicitation.Rmd. Rebuilding it
      # from source links it against whichever RcppParallel actually resolved.
      - name: Rebuild stringfish against the installed RcppParallel
        run: |
          if (requireNamespace("stringfish", quietly = TRUE) &&
              !isTRUE(tryCatch({ loadNamespace("stringfish"); TRUE },
                               error = function(e) FALSE))) {
            install.packages("stringfish", type = "source",
                             repos = "https://cloud.r-project.org")
          }
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Prune agent-facing files from the site
        run: Rscript pkgdown/prune-site.R

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
