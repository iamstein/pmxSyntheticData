on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # pak does not read Additional_repositories from DESCRIPTION, so the
          # OpenDP r-universe has to be declared here or the suggested `opendp`
          # dependency cannot be resolved and the whole solve fails.
          extra-repositories: https://opendp.r-universe.dev

      # Install the hard dependencies plus exactly the suggested packages the
      # documentation actually executes, rather than every Suggests.
      #
      # rxode2 is deliberately absent. Nothing in the documentation runs it:
      # the one rxode2 block, in vignettes/articles/model-elicitation.Rmd, is a
      # plain ```r fence that the article itself notes was never executed.
      # Installing it anyway pulled in rxode2 -> qs -> stringfish, whose TBB
      # symbols do not resolve against RcppParallel 6.0.0 ("undefined symbol:
      # ...concurrent_vector_base_v3..."), and downlit loaded it while
      # autolinking that article's rxode2 references. That failed every site
      # build from 2026-07-23 on. Without rxode2 installed, downlit leaves
      # those references as plain text and the block still renders.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::pkgdown
            any::ggplot2
            any::knitr
            any::nlmixr2data
            any::opendp
            any::rmarkdown
            any::xgxr
            local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Prune agent-facing files from the site
        run: Rscript pkgdown/prune-site.R

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
